<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FR1EV Security | Roblox Link</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #040816, #091327);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 1000px;
      padding: 20px;
    }

    .back {
      margin-bottom: 20px;
    }

    .back a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      background: #111827;
      padding: 10px 15px;
      border-radius: 10px;
    }

    .card {
      background: #0f172a;
      padding: 50px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* 🔥 COOL TITLE */
    h1 {
      margin: 0;
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ✨ SUBTEXT (better looking) */
    .desc {
      margin-top: 20px;
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.6;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 22px;
      border-radius: 14px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s;
      min-width: 190px;
      text-align: center;
      font-size: 16px;
    }

    /* 🔵 MAIN BUTTON */
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #4f8ff8, #1d4ed8);
      transform: translateY(-1px);
    }

    /* ⚫ SIDE BUTTONS */
    .btn-secondary {
      background: #1f2937;
      color: #e5e7eb;
    }

    .btn-secondary:hover {
      background: #374151;
      transform: translateY(-1px);
    }

    .status {
      margin-top: 22px;
      font-size: 15px;
      color: #9ca3af;
    }

    .good {
      color: #60a5fa;
    }

    .bad {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="back">
      <a href="https://fr1ev.github.io/fr1ev-security/">← Back</a>
    </div>

    <div class="card">
      <h1>FR1EV Security Roblox Link</h1>

      <div class="desc">
        Link your Roblox account to FR1EV Security to unlock verification, advanced role syncing,
        Roblox connection features, and future integrations across your Discord servers.
      </div>

      <div class="buttons">
        <!-- LEFT -->
        <a class="btn btn-secondary" href="https://fr1ev.github.io/fr1ev-security/roblox/tos.html">TOS</a>

        <!-- MIDDLE -->
        <a id="actionBtn" class="btn btn-primary" href="#">Loading...</a>

        <!-- RIGHT -->
        <a class="btn btn-secondary" href="https://fr1ev.github.io/fr1ev-security/roblox/privacy.html">Privacy</a>

        <!-- DISCORD -->
        <a class="btn btn-secondary" href="https://discord.gg/invite/TEMa2cFh6h">Discord</a>
      </div>

      <div id="status" class="status">Checking link status...</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const discordId = params.get("discord_id");

    const actionBtn = document.getElementById("actionBtn");
    const status = document.getElementById("status");

    const worker = "https://fr1ev-auth.fr1evvv.workers.dev";

    if (!discordId) {
      actionBtn.textContent = "Open from Discord";
      actionBtn.href = "#";
      status.textContent = "This page must be opened from Discord.";
      status.classList.add("bad");
    } else {
      fetch(`${worker}/api/linked?discord_id=${discordId}`)
        .then(res => res.json())
        .then(data => {
          if (data.linked) {
            actionBtn.textContent = "Unlink Roblox";
            actionBtn.href = `https://fr1ev.github.io/fr1ev-security/roblox/unlink.html?discord_id=${discordId}`;
            status.textContent = `Linked as ${data.roblox_username}`;
            status.classList.add("good");
          } else {
            actionBtn.textContent = "Link Roblox";
            actionBtn.href = `${worker}/roblox/link?discord_id=${discordId}`;
            status.textContent = "No Roblox account linked.";
          }
        })
        .catch(() => {
          actionBtn.textContent = "Link Roblox";
          actionBtn.href = `${worker}/roblox/link?discord_id=${discordId}`;
          status.textContent = "Could not check status.";
          status.classList.add("bad");
        });
    }
  </script>
</body>
</html>
