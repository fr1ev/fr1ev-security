<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FR1EV Security - Callback</title>
  <meta http-equiv="refresh" content="0;url=https://fr1ev-auth.fr1evvv.workers.dev/roblox/finish" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071133;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 700px;
      background: #121f4a;
      border: 1px solid #28428d;
      border-radius: 20px;
      padding: 32px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Completing Roblox link...</h1>
    <p id="msg">Please wait while we finish your sign-in.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");

    if (error) {
      window.location.href =
        `https://fr1ev.github.io/fr1ev-security/roblox/fail.html?error=${encodeURIComponent(error)}`;
    } else if (code && state) {
      window.location.href =
        `https://fr1ev-auth.fr1evvv.workers.dev/roblox/finish?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`;
    } else {
      document.getElementById("msg").textContent =
        "Missing callback data.";
    }
  </script>
</body>
</html>
