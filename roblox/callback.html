<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Callback Debug</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .box {
      max-width: 780px;
      background: #121a30;
      border: 1px solid #223055;
      border-radius: 18px;
      padding: 32px;
    }
    code {
      background: #0a1328;
      padding: 2px 6px;
      border-radius: 6px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Callback Debug</h1>
    <p id="status">Checking callback parameters...</p>
    <p id="details"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");

    const status = document.getElementById("status");
    const details = document.getElementById("details");

    if (error) {
      status.textContent = "Roblox returned an error.";
      details.innerHTML = `Error: <code>${error}</code>`;
    } else if (code) {
      status.textContent = "Authorization code detected.";
      details.innerHTML = `Code: <code>${code}</code><br>State: <code>${state || "none"}</code>`;
    } else {
      status.textContent = "No callback data was found.";
      details.textContent = "That is normal if you opened this page directly.";
    }
  </script>
</body>
</html>
