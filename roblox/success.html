<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Successful</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .box {
      max-width: 700px;
      background: #121a30;
      border: 1px solid #223055;
      border-radius: 18px;
      padding: 32px;
    }
    a { color: #8fb7ff; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Roblox linked successfully</h1>
    <p id="msg">Your Roblox account has been linked.</p>
    <p>You can now close this page and return to Discord.</p>
    <p><a href="./index.html">Back</a></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const user = params.get("roblox_user");
    if (user) {
      document.getElementById("msg").textContent =
        `Your Roblox account ${user} has been linked.`;
    }
  </script>
</body>
</html>
