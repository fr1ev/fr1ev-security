<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FR1EV Callback</title>
</head>
<body>
  <h2>OAuth callback page</h2>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      document.body.innerHTML = `<h2>✅ Code received</h2><code>${code}</code>`;
    } else {
      document.body.innerHTML = `<h2>❌ No code found</h2>`;
    }
  </script>
</body>
</html>
